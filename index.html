<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏔️ Climbers' Escape Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 30%, #E0F4FF 60%, #FFFDE7 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Floating snow */
    .snowflakes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .snowflake {
      position: absolute;
      top: -20px;
      color: #fff;
      font-size: 1.2em;
      animation: fall linear infinite;
      opacity: 0.8;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .hero {
      position: relative;
      text-align: center;
      padding: 60px 20px 40px;
      z-index: 1;
    }

    .mountain-scene {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .hero h1 {
      font-size: clamp(1.6rem, 4vw, 3rem);
      font-weight: 900;
      color: #2c3e7a;
      text-shadow: 3px 3px 0px rgba(255,255,255,0.8), 0 0 30px rgba(100,150,255,0.3);
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .hero h2 {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: #4a6fa5;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .hero .subtitle {
      font-size: 1rem;
      color: #6b8cba;
      font-weight: 600;
      background: rgba(255,255,255,0.6);
      display: inline-block;
      padding: 6px 20px;
      border-radius: 20px;
      margin-bottom: 30px;
    }

    .infographic-container {
      max-width: 700px;
      margin: 0 auto 40px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(44,62,122,0.25);
      border: 5px solid #fff;
      position: relative;
      z-index: 1;
    }
    .infographic-container img {
      width: 100%;
      display: block;
    }

    /* Nav cards */
    .nav-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 60px;
      position: relative;
      z-index: 1;
    }
    .nav-title {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 800;
      color: #2c3e7a;
      margin-bottom: 24px;
    }
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }
    .nav-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      border-radius: 24px;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .nav-card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 16px 30px rgba(0,0,0,0.2);
    }
    .nav-card .emoji { font-size: 2.8rem; margin-bottom: 10px; }
    .nav-card .label { font-size: 1.05rem; line-height: 1.3; }
    .nav-card .sublabel { font-size: 0.78rem; opacity: 0.85; margin-top: 4px; font-weight: 600; }

    .card-intro   { background: linear-gradient(135deg, #667eea, #764ba2); }
    .card-slides  { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .card-video   { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .card-game    { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a5c3a; }

    /* mountains at bottom */
    .mountain-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .mountain-footer svg { display: block; }
  </style>
</head>
<body>

<div class="snowflakes" id="snowflakes"></div>

<div class="hero">
  <div class="mountain-scene">🏔️❄️🦶</div>
  <h1>Climbers' Escape Game</h1>
  <h2>In Search of Bigfoot</h2>
  <div class="subtitle">🎮 數位密室逃脫遊戲 · 英語形態學 · Digital Escape Room</div>
</div>

<div style="max-width:700px; margin:0 auto 30px; padding:0 20px; position:relative; z-index:1;">
  <div class="infographic-container">
    <img src="Digital_Escape_Room_Infographic.png" alt="Digital Escape Room Infographic">
  </div>
</div>

<div class="nav-section">
  <div class="nav-title">✨ 選擇你的冒險 Choose Your Adventure ✨</div>
  <div class="nav-grid">
    <a href="intro.html" class="nav-card card-intro">
      <div class="emoji">📖</div>
      <div class="label">遊戲簡介</div>
      <div class="sublabel">Introduction</div>
    </a>
    <a href="slides.html" class="nav-card card-slides">
      <div class="emoji">🖼️</div>
      <div class="label">畫面簡報</div>
      <div class="sublabel">Slide Deck</div>
    </a>
    <a href="video.html" class="nav-card card-video">
      <div class="emoji">🎬</div>
      <div class="label">影片</div>
      <div class="sublabel">Video</div>
    </a>
    <a href="game.html" class="nav-card card-game">
      <div class="emoji">🎮</div>
      <div class="label">開始遊戲！</div>
      <div class="sublabel">Play Now!</div>
    </a>
  </div>
</div>

<div class="mountain-footer">
  <svg viewBox="0 0 1440 120" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,120 L0,80 L120,30 L240,70 L360,10 L480,60 L600,20 L720,55 L840,5 L960,50 L1080,15 L1200,45 L1320,25 L1440,55 L1440,120 Z" fill="rgba(255,255,255,0.4)"/>
    <path d="M0,120 L0,90 L180,45 L360,85 L540,35 L720,75 L900,30 L1080,70 L1260,40 L1440,65 L1440,120 Z" fill="rgba(255,255,255,0.6)"/>
  </svg>
</div>

<script>
  // Generate snowflakes
  const container = document.getElementById('snowflakes');
  const symbols = ['❄', '❅', '❆', '✦', '✧'];
  for (let i = 0; i < 25; i++) {
    const el = document.createElement('div');
    el.className = 'snowflake';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (4 + Math.random() * 6) + 's';
    el.style.animationDelay = (Math.random() * 5) + 's';
    el.style.fontSize = (0.8 + Math.random() * 1.2) + 'em';
    container.appendChild(el);
  }
</script>
</body>
</html>
